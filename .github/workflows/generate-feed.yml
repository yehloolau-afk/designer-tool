name: Generate RSS Feed

on:
  schedule:
    - cron: '0 2 * * *'  # 每天北京时间 10:00 运行
  workflow_dispatch:      # 支持手动触发

jobs:
  generate-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil

      - name: Generate RSS feed
        run: python scripts/generate_feed.py

      - name: Commit and push feed.xml
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add feed.xml
          git diff --staged --quiet || git commit -m "chore: update RSS feed $(date +%Y-%m-%d)"
          git push
