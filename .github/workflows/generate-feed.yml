name: Generate RSS Feed

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次
  workflow_dispatch:      # 支持手动触发

jobs:
  generate-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil

      - name: Generate RSS feed
        run: python scripts/generate_feed.py

      - name: Commit and push data files
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add feed.xml data/
          git diff --staged --quiet || git commit -m "chore: update channel data $(date +'%Y-%m-%d %H:%M')"
          git push
